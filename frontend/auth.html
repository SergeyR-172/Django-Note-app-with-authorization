<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Мои заметки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 py-8 max-w-md">
        <!-- Карточка авторизации -->
        <div class="auth-card bg-white rounded-xl p-8 shadow-sm border border-gray-100 transition">
            <!-- Заголовок -->
            <div class="text-center mb-8">
                <i class="fas fa-book-open text-4xl text-blue-500 mb-4"></i>
                <h1 class="text-3xl font-bold text-gray-800">Мои заметки</h1>
                <p class="text-gray-600 mt-2">Войдите в свой аккаунт</p>
            </div>

            <!-- Переключатель между формами -->
            <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
                <button type="button" id="loginTab" class="flex-1 py-2 px-4 rounded-md bg-white shadow-sm text-blue-600 font-medium">
                    Вход
                </button>
                <button type="button" id="registerTab" class="flex-1 py-2 px-4 rounded-md text-gray-600 font-medium">
                    Регистрация
                </button>
            </div>

            <!-- Форма авторизации -->
            <form id="loginForm" class="space-y-6">
                <!-- Поле для email/логина -->
                <div>
                    <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-envelope mr-2"></i>Электронная почта или логин
                    </label>
                    <input type="text" id="loginEmail" name="email" required
                           class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg transition"
                           placeholder="Введите email или логин">
                </div>

                <!-- Поле для пароля -->
                <div>
                    <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2"></i>Пароль
                    </label>
                    <input type="password" id="loginPassword" name="password" required
                           class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg transition"
                           placeholder="Введите пароль">
                </div>

                <!-- Чекбокс "Запомнить меня" -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" name="remember"
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-gray-700">
                        Запомнить меня
                    </label>
                </div>

                <!-- Кнопка входа -->
                <button type="submit"
                        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded-lg font-medium transition flex items-center justify-center">
                    <i class="fas fa-sign-in-alt mr-2"></i>Войти
                </button>
            </form>

            <!-- Форма регистрации -->
            <form id="registerForm" class="space-y-6 hidden">
                <!-- Поле для имени пользователя -->
                <div>
                    <label for="registerUsername" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user mr-2"></i>Имя пользователя
                    </label>
                    <input type="text" id="registerUsername" name="username" required
                           class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg transition"
                           placeholder="Введите имя пользователя">
                </div>

                <!-- Поле для email -->
                <div>
                    <label for="registerEmail" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-envelope mr-2"></i>Электронная почта
                    </label>
                    <input type="email" id="registerEmail" name="email" required
                           class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg transition"
                           placeholder="Введите email">
                </div>

                <!-- Поле для пароля -->
                <div>
                    <label for="registerPassword" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2"></i>Пароль
                    </label>
                    <input type="password" id="registerPassword" name="password" required
                           class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg transition"
                           placeholder="Введите пароль">
                </div>

                <!-- Поле для подтверждения пароля -->
                <div>
                    <label for="registerPassword2" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2"></i>Подтвердите пароль
                    </label>
                    <input type="password" id="registerPassword2" name="password2" required
                           class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg transition"
                           placeholder="Подтвердите пароль">
                </div>

                <!-- Кнопка регистрации -->
                <button type="submit"
                        class="w-full bg-green-500 hover:bg-green-600 text-white py-3 px-4 rounded-lg font-medium transition flex items-center justify-center">
                    <i class="fas fa-user-plus mr-2"></i>Зарегистрироваться
                </button>
            </form>

            <!-- Ссылки -->
            <div class="mt-6 text-center space-y-2">
                <a href="#" class="text-sm text-blue-600 hover:text-blue-800 transition">
                    <i class="fas fa-key mr-1"></i>Забыли пароль?
                </a>
            </div>
        </div>

        <!-- Сообщение об ошибке (скрыто по умолчанию) -->
        <div id="errorMessage" class="mt-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg hidden">
            <i class="fas fa-exclamation-triangle mr-2"></i>
            <span>Неверный логин или пароль. Попробуйте снова.</span>
        </div>
        
        <!-- Сообщение об успехе (скрыто по умолчанию) -->
        <div id="successMessage" class="mt-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg hidden">
            <i class="fas fa-check-circle mr-2"></i>
            <span id="successMessageText">Операция выполнена успешно!</span>
        </div>
    </div>

    <!-- Подключаем модули как модули -->
    <script type="module" src="js/main.js"></script>
    
    <script type="module">
        // Переключение между формами
        document.getElementById('loginTab').addEventListener('click', function() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            this.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            this.classList.remove('text-gray-600');
            document.getElementById('registerTab').classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            document.getElementById('registerTab').classList.add('text-gray-600');
        });

        document.getElementById('registerTab').addEventListener('click', function() {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            this.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            this.classList.remove('text-gray-600');
            document.getElementById('loginTab').classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            document.getElementById('loginTab').classList.add('text-gray-600');
        });

        // Обработчик формы авторизации
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Предотвращаем отправку формы

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Отправляем запрос на сервер для получения токена
            const result = await AuthAPI.login({
                username: email,
                password: password
            });

            if (result.success) {
                // Сохраняем токен в localStorage
                AuthAPI.saveTokens(result.data.access, result.data.refresh);
                
                // Показываем сообщение об успехе
                document.getElementById('errorMessage').classList.add('hidden');
                document.getElementById('successMessageText').textContent = 'Вход выполнен успешно! Перенаправление...';
                document.getElementById('successMessage').classList.remove('hidden');
                
                // Перенаправляем на страницу заметок через 1 секунду
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                // Показываем сообщение об ошибке
                document.getElementById('successMessage').classList.add('hidden');
                let errorMessage = 'Неверный логин или пароль';
                if (result.errors.detail) {
                    errorMessage = result.errors.detail;
                }
                document.getElementById('errorMessage').querySelector('span').textContent = errorMessage;
                document.getElementById('errorMessage').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('errorMessage').classList.add('hidden');
                }, 5000); // Скрываем через 5 секунд
            }
        });

        // Обработчик формы регистрации
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Предотвращаем отправку формы

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const password2 = document.getElementById('registerPassword2').value;

            // Проверяем совпадение паролей
            if (password !== password2) {
                document.getElementById('successMessage').classList.add('hidden');
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorMessage').querySelector('span').textContent = 'Пароли не совпадают!';
                setTimeout(() => {
                    document.getElementById('errorMessage').classList.add('hidden');
                }, 5000); // Скрываем через 5 секунд
                return;
            }

            // Отправляем запрос на сервер для регистрации
            const result = await AuthAPI.register({
                username: username,
                email: email,
                password: password,
                password2: password2
            });

            if (result.success) {
                // Показываем сообщение об успехе
                document.getElementById('errorMessage').classList.add('hidden');
                document.getElementById('successMessageText').textContent = 'Регистрация выполнена успешно! Вы будете перенаправлены на страницу входа.';
                document.getElementById('successMessage').classList.remove('hidden');
                
                // Очищаем форму
                document.getElementById('registerForm').reset();
                
                // Переключаемся на форму входа через 2 секунды
                setTimeout(() => {
                    document.getElementById('loginTab').click();
                    document.getElementById('successMessage').classList.add('hidden');
                }, 2000);
            } else {
                // Показываем сообщение об ошибке
                document.getElementById('successMessage').classList.add('hidden');
                let errorMessage = 'Ошибка регистрации!';
                if (result.errors.username) {
                    errorMessage = result.errors.username[0];
                } else if (result.errors.email) {
                    errorMessage = result.errors.email[0];
                } else if (result.errors.password) {
                    errorMessage = result.errors.password[0];
                }
                document.getElementById('errorMessage').querySelector('span').textContent = errorMessage;
                document.getElementById('errorMessage').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('errorMessage').classList.add('hidden');
                }, 5000); // Скрываем через 5 секунд
            }
        });
    </script>
</body>
</html>

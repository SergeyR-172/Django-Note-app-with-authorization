<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заметки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Заголовок и кнопка добавления -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-book-open mr-3 text-blue-500"></i>Мои заметки
            </h1>
            <div class="flex gap-2">
                <button id="logoutBtn" class="bg-gray-50 hover:bg-gray-600 text-white px-4 py-2 rounded-lg flex items-center transition">
                    <i class="fas fa-sign-out-alt mr-2"></i> Выйти
                </button>
                <button id="addNoteBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center transition">
                    <i class="fas fa-plus mr-2"></i> Новая заметка
                </button>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Блок с сеткой заметок -->
            <div class="w-full lg:w-2/3">
                <!-- Фильтры и поиск -->
                <div class="mb-6 bg-white p-4 rounded-xl shadow-sm">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="relative flex-grow">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="searchInput" placeholder="Поиск заметок..." class="pl-10 pr-4 py-2 w-full border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <select id="categoryFilter" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Все заметки</option>
                            <option value="Работа">Работа</option>
                            <option value="Личное">Личное</option>
                            <option value="Идеи">Идеи</option>
                            <option value="Важное">Важное</option>
                        </select>
                    </div>
                    <div class="flex flex-wrap gap-2 mt-4">
                        <span class="tag tag-work px-3 py-1 rounded-full text-sm cursor-pointer" data-category="Работа">Работа</span>
                        <span class="tag tag-personal px-3 py-1 rounded-full text-sm cursor-pointer" data-category="Личное">Личное</span>
                        <span class="tag tag-ideas px-3 py-1 rounded-full text-sm cursor-pointer" data-category="Идеи">Идеи</span>
                        <span class="tag tag-important px-3 py-1 rounded-full text-sm cursor-pointer" data-category="Важное">Важное</span>
                    </div>
                </div>

                <!-- Индикатор загрузки -->
                <div id="loadingIndicator" class="text-center py-8 hidden">
                    <div class="loading mx-auto"></div>
                    <p class="mt-2 text-gray-600">Загрузка заметок...</p>
                </div>

                <!-- Сообщение об ошибке -->
                <div id="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg hidden mb-6">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    <span id="errorText">Произошла ошибка при загрузке заметок</span>
                </div>

                <!-- Сетка заметок -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="notesGrid">
                    <!-- Заметки будут загружены сюда -->
                </div>
            </div>

            <!-- Блок просмотра/редактирования заметки -->
            <div class="w-full lg:w-1/3">
                <div class="bg-white rounded-xl shadow-sm p-6 sticky top-6" id="noteView">
                    <div class="text-center py-12 text-gray-400" id="emptyNoteView">
                        <i class="fas fa-sticky-note text-4xl mb-3"></i>
                        <p>Выберите заметку для просмотра или создайте новую</p>
                    </div>

                    <!-- Контент заметки (скрыт по умолчанию) -->
                    <div class="hidden" id="noteContent">
                        <input type="hidden" id="noteId">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <select id="noteCategory" class="border rounded-lg px-3 py-1 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                    <option value="Работа">Работа</option>
                                    <option value="Личное">Личное</option>
                                    <option value="Идеи">Идеи</option>
                                    <option value="Важное">Важное</option>
                                </select>
                            </div>
                            <div class="flex gap-2">
                                <button id="favoriteBtn" class="text-gray-40 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100">
                                    <i class="far fa-star"></i>
                                </button>
                                <button id="deleteBtn" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>

                        <input type="text" id="noteTitle" class="w-full text-2xl font-bold border-none focus:ring-0 px-0 mb-2" placeholder="Заголовок">

                        <div class="note-content border-t pt-4 mb-4" id="noteText" contenteditable="true">
                            Содержание заметки...
                        </div>

                        <div class="flex items-center text-sm text-gray-500 mb-4">
                            <i class="far fa-calendar-alt mr-2"></i>
                            <span id="noteDate">12.05.2023</span>
                        </div>

                        <div class="flex gap-2">
                            <button id="saveBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg flex-1 transition">
                                Сохранить
                            </button>
                            <button id="cancelBtn" class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg transition">
                                Отмена
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем модули как модули -->
    <script type="module" src="js/main.js"></script>
    
    <script type="module">
        // Текущая заметка
        let currentNote = null;
        let notes = [];
        
        // Проверка аутентификации
        function checkAuth() {
            if (!AuthAPI.isAuthenticated()) {
                // Перенаправляем на страницу входа
                window.location.href = 'auth.html';
                return false;
            }
            return true;
        }
        
        // Обновление токена
        async function refreshAccessToken() {
            const tokens = AuthAPI.getTokens();
            if (!tokens.refresh) {
                // Нет refresh токена, перенаправляем на страницу входа
                logout();
                return;
            }
            
            const result = await AuthAPI.refreshToken(tokens.refresh);
            if (result.success) {
                AuthAPI.saveTokens(result.data.access, tokens.refresh);
                return result.data.access;
            } else {
                // Не удалось обновить токен, перенаправляем на страницу входа
                logout();
            }
        }
        
        // Выход из системы
        function logout() {
            AuthAPI.clearTokens();
            window.location.href = 'auth.html';
        }
        
        // Функция для выполнения запросов с автоматическим обновлением токена
        async function apiRequest(requestFn) {
            let result = await requestFn();
            
            // Если токен истек, пробуем обновить его
            if (!result.success && result.error === 'unauthorized') {
                const newToken = await refreshAccessToken();
                if (newToken) {
                    // Повторяем запрос с новым токеном
                    result = await requestFn();
                }
            }
            
            return result;
        }
        
        // Загрузка заметок
        async function loadNotes() {
            if (!checkAuth()) return;
            
            // Показываем индикатор загрузки
            Utils.toggleLoading(true);
            document.getElementById('errorMessage').classList.add('hidden');
            
            const result = await apiRequest(() => NotesAPI.loadNotes());
            
            if (result.success) {
                notes = result.data;
                renderNotes(notes);
            } else {
                console.error('Ошибка загрузки заметок:', result.error);
                document.getElementById('errorText').textContent = 'Не удалось загрузить заметки. Попробуйте обновить страницу.';
                document.getElementById('errorMessage').classList.remove('hidden');
            }
            
            // Скрываем индикатор загрузки
            Utils.toggleLoading(false);
        }
        
        // Отображение заметок
        function renderNotes(notesToRender) {
            const notesGrid = document.getElementById('notesGrid');
            notesGrid.innerHTML = '';
            
            if (notesToRender.length === 0) {
                notesGrid.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500">Заметки не найдены</div>';
                return;
            }
            
            notesToRender.forEach(note => {
                const noteElement = document.createElement('div');
                noteElement.className = 'note-card bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer transition hover:border-blue-200';
                noteElement.dataset.id = note.id;
                
                // Определяем класс тега
                const tagClass = Utils.getCategoryClass(note.category);
                
                noteElement.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-semibold text-lg text-gray-800 truncate">${note.title || 'Без названия'}</h3>
                        <span class="tag ${tagClass} px-2 py-1 rounded-full text-xs">${note.category}</span>
                    </div>
                    <p class="text-gray-600 text-sm mb-3 line-clamp-3">${note.content.substring(0, 100)}${note.content.length > 100 ? '...' : ''}</p>
                    <div class="flex justify-between items-center text-xs text-gray-400">
                        <span>${Utils.formatDate(note.created_at)}</span>
                        ${note.favourite ? '<i class="fas fa-star text-yellow-400"></i>' : '<i class="far fa-star"></i>'}
                    </div>
                `;
                
                noteElement.addEventListener('click', () => showNote(note));
                notesGrid.appendChild(noteElement);
            });
        }
        
        // Функция для отображения заметки в правой панели
        function showNote(note) {
            currentNote = note;
            
            // Скрываем пустое состояние
            document.getElementById('emptyNoteView').classList.add('hidden');
            // Показываем контент заметки
            document.getElementById('noteContent').classList.remove('hidden');
            
            // Заполняем поля данными заметки
            document.getElementById('noteId').value = note.id || '';
            document.getElementById('noteTitle').value = note.title || '';
            document.getElementById('noteText').innerHTML = note.content || '';
            document.getElementById('noteCategory').value = note.category || 'Работа';
            document.getElementById('noteDate').textContent = note.created_at ? Utils.formatDate(note.created_at) : Utils.formatDate(new Date());
            
            // Обновляем иконку избранного
            const favoriteIcon = document.getElementById('favoriteBtn').querySelector('i');
            if (note.favourite) {
                favoriteIcon.className = 'fas fa-star text-yellow-400';
            } else {
                favoriteIcon.className = 'far fa-star';
            }
        }
        
        // Создание новой заметки
        async function createNote() {
            if (!checkAuth()) return;
            
            const noteData = {
                title: document.getElementById('noteTitle').value || 'Без названия',
                content: document.getElementById('noteText').innerHTML,
                category: document.getElementById('noteCategory').value,
                favourite: false
            };
            
            const result = await apiRequest(() => NotesAPI.createNote(noteData));
            
            if (result.success) {
                const newNote = result.data;
                notes.unshift(newNote);
                renderNotes(notes);
                showNote(newNote);
            } else {
                console.error('Ошибка создания заметки:', result.error);
                Utils.showError('Не удалось создать заметку');
            }
        }
        
        // Обновление заметки
        async function updateNote() {
            if (!checkAuth() || !currentNote) return;
            
            const noteId = document.getElementById('noteId').value;
            if (!noteId) {
                // Это новая заметка
                await createNote();
                return;
            }
            
            const noteData = {
                title: document.getElementById('noteTitle').value || 'Без названия',
                content: document.getElementById('noteText').innerHTML,
                category: document.getElementById('noteCategory').value,
                favourite: currentNote.favourite
            };
            
            const result = await apiRequest(() => NotesAPI.updateNote(noteId, noteData));
            
            if (result.success) {
                const updatedNote = result.data;
                // Обновляем заметку в массиве
                const index = notes.findIndex(note => note.id === updatedNote.id);
                if (index !== -1) {
                    notes[index] = updatedNote;
                }
                currentNote = updatedNote;
                renderNotes(notes);
                showNote(updatedNote);
            } else {
                console.error('Ошибка обновления заметки:', result.error);
                Utils.showError('Не удалось обновить заметку');
            }
        }
        
        // Удаление заметки
        async function deleteNote() {
            if (!checkAuth() || !currentNote || !currentNote.id) return;
            
            if (!confirm('Вы уверены, что хотите удалить эту заметку?')) {
                return;
            }
            
            const result = await apiRequest(() => NotesAPI.deleteNote(currentNote.id));
            
            if (result.success) {
                // Удаляем заметку из массива
                notes = notes.filter(note => note.id !== currentNote.id);
                renderNotes(notes);
                
                // Скрываем панель редактирования
                document.getElementById('noteContent').classList.add('hidden');
                document.getElementById('emptyNoteView').classList.remove('hidden');
                currentNote = null;
            } else {
                console.error('Ошибка удаления заметки:', result.error);
                Utils.showError('Не удалось удалить заметку');
            }
        }
        
        // Переключение избранного
        async function toggleFavorite() {
            if (!checkAuth() || !currentNote) return;
            
            const noteId = document.getElementById('noteId').value;
            if (!noteId) return;
            
            const noteData = {
                title: document.getElementById('noteTitle').value || 'Без названия',
                content: document.getElementById('noteText').innerHTML,
                category: document.getElementById('noteCategory').value,
                favourite: !currentNote.favourite
            };
            
            const result = await apiRequest(() => NotesAPI.updateNote(noteId, noteData));
            
            if (result.success) {
                const updatedNote = result.data;
                // Обновляем заметку в массиве
                const index = notes.findIndex(note => note.id === updatedNote.id);
                if (index !== -1) {
                    notes[index] = updatedNote;
                }
                currentNote = updatedNote;
                renderNotes(notes);
                showNote(updatedNote);
            } else {
                console.error('Ошибка обновления заметки:', result.error);
                Utils.showError('Не удалось обновить заметку');
            }
        }
        
        // Фильтрация заметок
        function filterNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            let filteredNotes = notes;
            
            // Фильтрация по поисковому запросу
            if (searchTerm) {
                filteredNotes = filteredNotes.filter(note => 
                    (note.title && note.title.toLowerCase().includes(searchTerm)) ||
                    (note.content && note.content.toLowerCase().includes(searchTerm))
                );
            }
            
            // Фильтрация по категории
            if (categoryFilter) {
                filteredNotes = filteredNotes.filter(note => note.category === categoryFilter);
            }
            
            renderNotes(filteredNotes);
        }
        
        // Обработчик для кнопки добавления новой заметки
        document.getElementById('addNoteBtn').addEventListener('click', function() {
            // Создаем пустую заметку
            const newNote = {
                title: '',
                content: '',
                category: 'Работа',
                favourite: false,
                created_at: new Date().toISOString()
            };
            
            showNote(newNote);
            
            // Фокус на заголовке
            document.getElementById('noteTitle').focus();
        });
        
        // Обработчики событий
        document.addEventListener('DOMContentLoaded', function() {
            // Проверяем аутентификацию
            if (!checkAuth()) return;
            
            // Загружаем заметки
            loadNotes();
            
            // Обработчики для кнопок
            document.getElementById('saveBtn').addEventListener('click', updateNote);
            document.getElementById('cancelBtn').addEventListener('click', function() {
                if (currentNote) {
                    showNote(currentNote);
                } else {
                    document.getElementById('noteContent').classList.add('hidden');
                    document.getElementById('emptyNoteView').classList.remove('hidden');
                }
            });
            document.getElementById('deleteBtn').addEventListener('click', deleteNote);
            document.getElementById('favoriteBtn').addEventListener('click', toggleFavorite);
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            // Обработчики для фильтров
            document.getElementById('searchInput').addEventListener('input', filterNotes);
            document.getElementById('categoryFilter').addEventListener('change', filterNotes);
            
            // Обработчики для тегов
            document.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const category = this.dataset.category;
                    document.getElementById('categoryFilter').value = category;
                    filterNotes();
                });
            });
        });
    </script>
</body>
</html>
